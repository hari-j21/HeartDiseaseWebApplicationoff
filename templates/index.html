<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CardioPredict | Heart Disease Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="dashboard">

    <div class="sidebar">
      <a href="/">Home</a>
      <a href="/history">Patient History</a>
      <a href="/analytics">Analytics</a>
    </div>

    <div class="content">
      <div class="main-content">
        <h1 class="fade-in-title">Heart Disease Prediction</h1>

        <div class="card shadow-hover">
        <p class="text-muted">Enter clinical values below. The model will estimate the probability of heart disease using a trained machine learning pipeline.</p>

        <form action="/predict" method="POST" class="row g-3">

          <div class="col-md-4">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" name="age" min="1" max="120" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Sex</label>
            <select class="form-select" name="sex" required>
              <option value="1">Male</option>
              <option value="0">Female</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Chest Pain Type</label>
            <select class="form-select" name="cp" required>
              <option value="0">Typical Angina</option>
              <option value="1">Atypical Angina</option>
              <option value="2">Non-anginal Pain</option>
              <option value="3">Asymptomatic</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Resting BP (mmHg)</label>
            <input type="number" class="form-control" name="trestbps" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Cholesterol (mg/dL)</label>
            <input type="number" class="form-control" name="chol" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Fasting Blood Sugar &gt; 120</label>
            <select class="form-select" name="fbs" required>
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Rest ECG</label>
            <select class="form-select" name="restecg" required>
              <option value="0">Normal</option>
              <option value="1">ST-T Abnormality</option>
              <option value="2">Left Ventricular Hypertrophy</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Max Heart Rate</label>
            <input type="number" class="form-control" name="thalach" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Exercise Induced Angina</label>
            <select class="form-select" name="exang" required>
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Oldpeak (ST Depression)</label>
            <input type="number" step="0.1" class="form-control" name="oldpeak" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Slope</label>
            <select class="form-select" name="slope" required>
              <option value="0">Upsloping</option>
              <option value="1">Flat</option>
              <option value="2">Downsloping</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Major Vessels (0–4)</label>
            <input type="number" class="form-control" name="ca" min="0" max="4" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Thal</label>
            <select class="form-select" name="thal" required>
              <option value="0">Normal</option>
              <option value="1">Fixed Defect</option>
              <option value="2">Reversible Defect</option>
              <option value="3">Unknown</option>
            </select>
          </div>

          <div class="col-12 text-center mt-3">
            <button class="btn btn-dark btn-lg px-5">Predict Risk</button>
          </div>

        </form>
      </div>
    </div>
  </div>
  </div>

</body>
</html>
