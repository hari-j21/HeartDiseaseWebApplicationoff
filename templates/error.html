<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error | CardioPredict</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">CardioPredict</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="result-card shadow-lg">

      <h2 class="fw-bold text-danger">Something went wrong</h2>
      <p class="text-muted">
        The application could not process your request.
      </p>

      <div class="alert alert-danger">
        <strong>Error details:</strong><br>
        {{ error }}
      </div>

      <a href="/" class="btn btn-dark">
        Go Back
      </a>

    </div>
  </main>

</body>
</html>
